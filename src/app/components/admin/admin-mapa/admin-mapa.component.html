<div class="p-6 space-y-4">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl font-bold text-gray-800">Análisis Geográfico Global</h1>
      <p class="text-sm text-gray-500 mt-1">Zonas críticas de todo el sistema</p>
    </div>
  </div>

  <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-4">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <div>
        <label class="text-xs font-medium text-gray-500 mb-1 block">Desde</label>
        <input type="date" [(ngModel)]="fechaInicio"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"/>
      </div>
      <div>
        <label class="text-xs font-medium text-gray-500 mb-1 block">Hasta</label>
        <input type="date" [(ngModel)]="fechaFin"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none"/>
      </div>
      <div>
        <label class="text-xs font-medium text-gray-500 mb-1 block">Tipo de incidente</label>
        <select [(ngModel)]="tipoIncidente"
          class="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:outline-none">
          <option value="">Todos</option>
          @for (tipo of tiposIncidente; track tipo) {
            <option [value]="tipo">{{ tipo }}</option>
          }
        </select>
      </div>
      <div class="flex items-end gap-2">
        <button (click)="aplicarFiltros()"
          class="flex-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium px-4 py-2 rounded-xl transition-colors">
          Aplicar
        </button>
        <button (click)="limpiarFiltros()"
          class="px-4 py-2 border border-gray-200 rounded-xl text-sm text-gray-600 hover:bg-gray-50 transition-colors">
          Limpiar
        </button>
      </div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-4 gap-4">
    <div class="lg:col-span-3 bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
      <div class="px-4 py-3 border-b border-slate-100 flex items-center justify-between">
        <h3 class="text-sm font-semibold text-gray-700">Mapa de Zonas Críticas</h3>
        <div class="flex items-center gap-4 text-xs text-gray-500">
          <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-red-600 inline-block"></span> Alta (10+)</span>
          <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-yellow-500 inline-block"></span> Media (5-9)</span>
          <span class="flex items-center gap-1"><span class="w-3 h-3 rounded-full bg-green-600 inline-block"></span> Baja (1-4)</span>
        </div>
      </div>
      <div id="mapa-geo-admin" style="height: 450px; width: 100%;"></div>
    </div>

    <div class="space-y-4">
      <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-5">
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Total Incidencias</p>
        <p class="text-3xl font-bold text-gray-800 mt-2">{{ totalEmergencias }}</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-5">
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Zona más crítica</p>
        <p class="text-xl font-bold text-red-600 mt-2">{{ zonaCritica }}</p>
      </div>
      <div class="bg-white rounded-xl border border-slate-100 shadow-sm p-5">
        <p class="text-xs font-medium text-gray-500 uppercase tracking-wider">Talleres en mapa</p>
        <p class="text-3xl font-bold text-gray-800 mt-2">{{ talleresActivos }}</p>
      </div>
    </div>
  </div>
</div>
