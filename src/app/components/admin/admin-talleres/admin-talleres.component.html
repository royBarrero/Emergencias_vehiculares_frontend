<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-xl font-semibold text-gray-800">Todos los Talleres</h2>
  </div>

  <div *ngIf="cargando" class="text-center py-10 text-gray-400 text-sm">Cargando...</div>

  <div *ngIf="!cargando" class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
    <table class="w-full">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-100">
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Nombre</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Dirección</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Tenant</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Estado</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Calificación</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let taller of talleres" class="border-t border-slate-100 hover:bg-slate-50 transition-colors">
          <td class="px-6 py-4 text-sm font-medium text-gray-800">{{ taller.nombre_taller }}</td>
          <td class="px-6 py-4 text-sm text-gray-500">{{ taller.direccion }}</td>
          <td class="px-6 py-4 text-sm text-gray-500">{{ taller.id_tenant }}</td>
          <td class="px-6 py-4">
            <span [class]="taller.estado === 'activo' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'"
              class="px-3 py-1 rounded-full text-xs font-semibold">
              {{ taller.estado }}
            </span>
          </td>
          <td class="px-6 py-4 text-sm text-gray-800">{{ taller.calificacion_promedio }}</td>
        </tr>
        <tr *ngIf="talleres.length === 0">
          <td colspan="5" class="px-6 py-8 text-center text-sm text-gray-400">No hay talleres registrados</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
