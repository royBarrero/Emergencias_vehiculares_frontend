<div class="topbar">
  <div class="topbar-left">
    <h4 class="topbar-title">{{ titulo }}</h4>
    <div class="search-box">🔍 Buscar...</div>
  </div>
  <div class="topbar-right">
    <span class="topbar-username">{{ usuario?.nombre }}</span>
    <div class="topbar-avatar">{{ usuario?.nombre?.charAt(0) }}</div>
    <button class="btn-logout-top" (click)="cerrarSesion()">🚪 Salir</button>
  </div>
</div>
