<div class="flex h-screen bg-slate-50">

  <aside class="fixed left-0 top-0 z-50 flex h-screen w-64 flex-col border-r border-gray-800 bg-gray-900">

    <!-- Logo -->
    <div class="flex items-center gap-3 px-6 py-5 border-b border-gray-800">
      <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold text-sm">EV</div>
      <span class="text-base font-bold text-white">EmergenciasVial</span>
    </div>

    <!-- User -->
    <div class="flex items-center gap-3 px-6 py-4 border-b border-gray-800">
      <div class="w-9 h-9 rounded-full bg-blue-600 flex items-center justify-center text-white font-bold text-sm">
        {{ tenant?.nombre?.charAt(0) || usuario?.nombre?.charAt(0) }}
      </div>
      <div>
        <p class="text-sm font-semibold text-white">{{ tenant?.nombre || usuario?.nombre }}</p>
        <p class="text-xs text-gray-400">Tenant Admin</p>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-4 py-4 overflow-y-auto">
      <p class="text-xs font-semibold text-gray-500 uppercase tracking-widest mb-3 px-2">MENU</p>
      <ul class="flex flex-col gap-1">
        <li>
          <a routerLink="/tenant-admin/inicio" routerLinkActive="bg-blue-600 !text-white"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            Inicio
          </a>
        </li>
        <li>
          <a routerLink="/tenant-admin/talleres" routerLinkActive="bg-blue-600 !text-white"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
            </svg>
            Mis Talleres
          </a>
        </li>
        <li>
          <a routerLink="/tenant-admin/reportes" routerLinkActive="bg-blue-600 !text-white"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
            KPIs / Reportes
          </a>
        </li>
        <li>
          <a routerLink="/tenant-admin/bitacora" routerLinkActive="bg-blue-600 !text-white"
            [routerLinkActiveOptions]="{exact: true}"
            class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
            </svg>
            Bitácora
          </a>
        </li>
      </ul>
    </nav>

    <!-- Logout -->
    <div class="px-4 py-4 border-t border-gray-800">
      <button (click)="cerrarSesion()"
        class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-sm text-gray-400 hover:bg-red-900/40 hover:text-red-400 transition-all">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Cerrar sesión
      </button>
    </div>

  </aside>

  <!-- MAIN -->
  <div class="ml-64 flex-1 flex flex-col min-h-screen">
    <header class="sticky top-0 z-40 bg-white border-b border-slate-100 px-6 py-4 flex items-center justify-between">
      <h1 class="text-lg font-semibold text-gray-800">{{ tenant?.nombre || 'Mi Red' }}</h1>
      <div class="flex items-center gap-3">
        <span class="text-sm text-gray-500">{{ usuario?.nombre }}</span>
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-sm font-bold">
          {{ usuario?.nombre?.charAt(0) }}
        </div>
      </div>
    </header>
    <main class="flex-1 overflow-y-auto bg-gray-200">
      <router-outlet></router-outlet>
    </main>
  </div>

</div>
