<div class="p-6">
  <h2 class="text-xl font-semibold text-slate-800 mb-6">Bitácora</h2>

  <div *ngIf="cargando" class="text-center py-10 text-slate-400 text-sm">Cargando...</div>

  <div *ngIf="!cargando" class="bg-white rounded-xl border border-slate-100 shadow-sm overflow-hidden">
    <div class="px-6 py-4 border-b border-slate-100">
      <h3 class="text-sm font-semibold text-slate-700">Registro de actividad</h3>
    </div>
    <table class="w-full">
      <thead>
        <tr class="bg-slate-50 border-b border-slate-100">
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Acción</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Usuario</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">IP</th>
          <th class="text-left px-6 py-3 text-xs font-semibold text-slate-500 uppercase tracking-wide">Fecha</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of registros" class="border-t border-slate-100 hover:bg-slate-50 transition-colors">
          <td class="px-6 py-4">
            <span class="px-3 py-1 rounded-full text-xs font-semibold bg-blue-100 text-blue-700">
              {{ r.accion }}
            </span>
          </td>
          <td class="px-6 py-4 text-sm font-medium text-slate-800">{{ r.nombre_usuario }}</td>
          <td class="px-6 py-4 text-sm text-slate-500 font-mono">{{ r.ip_address }}</td>
          <td class="px-6 py-4 text-sm text-slate-500">{{ r.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
        </tr>
        <tr *ngIf="registros.length === 0">
          <td colspan="4" class="px-6 py-10 text-center text-sm text-slate-400">No hay registros de actividad</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
